name: Sync CardTrader Prices

on:
  schedule:
    - cron: "0 4 * * *"   # ogni notte alle 04:00 UTC
  workflow_dispatch:        # esecuzione manuale dal pannello GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run CardTrader sync
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CARDTRADER_API_TOKEN: ${{ secrets.CARDTRADER_API_TOKEN }}
        run: npx tsx scripts/sync-cardtrader.ts
